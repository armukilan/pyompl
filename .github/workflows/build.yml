name: Build and Publish pyompl

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pin OMPL submodule to 2.0.0 on all OSes
      - name: Pin OMPL submodule to 2.0.0
        run: |
          cd ompl
          git fetch --tags
          git checkout 2.0.0

      - name: Re-apply VampConfig fix on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd ompl
          git checkout main -- CMakeModules/VampConfig.cmake



      - name: Re-apply VAMP CompilerSettings fix on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $file = "ompl/external/vamp/cmake/CompilerSettings.cmake"
          $content = @'
          if(NOT DEFINED VAMP_ARCH)
              string(TOLOWER "${CMAKE_SYSTEM_PROCESSOR}" _arch)
              if(_arch STREQUAL "x86_64" OR _arch STREQUAL "amd64")
                  if(MSVC)
                      set(VAMP_ARCH "/arch:AVX2")
                  else()
                      set(VAMP_ARCH "-march=native -mavx2")
                  endif()
              elseif(_arch STREQUAL "aarch64" OR _arch STREQUAL "arm64")
                  if(MSVC)
                      set(VAMP_ARCH "")
                  else()
                      set(VAMP_ARCH "-mcpu=native -mtune=native")
                      if(CMAKE_CXX_COMPILER_ID STREQUAL "GNU" AND CMAKE_CXX_COMPILER_VERSION VERSION_GREATER_EQUAL 13.0)
                          string(APPEND VAMP_ARCH " -flax-vector-conversions")
                      endif()
                  endif()
              else()
                  message(FATAL_ERROR "Unsupported architecture ${CMAKE_SYSTEM_PROCESSOR}")
              endif()
          endif()

          if(NOT MSVC)
              set(VAMP_FAST_ARGS "-fno-math-errno -fno-signed-zeros -fno-trapping-math -fno-rounding-math -ffp-contract=fast")
              string(TOLOWER "${CMAKE_SYSTEM_PROCESSOR}" _arch)
              if(_arch STREQUAL "x86_64" OR _arch STREQUAL "amd64")
                  string(APPEND VAMP_FAST_ARGS " -fassociative-math")
                  if(CMAKE_CXX_COMPILER_ID STREQUAL "Clang")
                      string(APPEND VAMP_FAST_ARGS " -fno-honor-infinities -fno-honor-nans")
                      if(CMAKE_CXX_COMPILER_VERSION VERSION_GREATER 11.0.0)
                          string(APPEND VAMP_FAST_ARGS " -fapprox-func")
                      endif()
                  endif()
              endif()
              set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} ${VAMP_ARCH} -Wall -Wextra -Wno-ignored-attributes")
              set(CMAKE_CXX_FLAGS_DEBUG "${CMAKE_CXX_FLAGS_DEBUG} -g -O0")
              set(CMAKE_CXX_FLAGS_RELWITHDEBINFO "${CMAKE_CXX_FLAGS_RELWITHDEBINFO} -g")
              set(CMAKE_CXX_FLAGS_RELEASE "${CMAKE_CXX_FLAGS_RELEASE} -O3 ${VAMP_FAST_ARGS}")
              set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} ${VAMP_ARCH} -Wall -Wextra -Wno-ignored-attributes")
              set(CMAKE_C_FLAGS_DEBUG "${CMAKE_C_FLAGS_DEBUG} -g -O0")
              set(CMAKE_C_FLAGS_RELWITHDEBINFO "${CMAKE_C_FLAGS_RELWITHDEBINFO} -g")
              set(CMAKE_C_FLAGS_RELEASE "${CMAKE_C_FLAGS_RELEASE} -O3 ${VAMP_FAST_ARGS}")
          else()
              set(CMAKE_CXX_FLAGS "${CMAKE_CXX_FLAGS} ${VAMP_ARCH} /W3")
              set(CMAKE_CXX_FLAGS_RELEASE "${CMAKE_CXX_FLAGS_RELEASE} /O2 /fp:fast")
              set(CMAKE_C_FLAGS "${CMAKE_C_FLAGS} ${VAMP_ARCH} /W3")
              set(CMAKE_C_FLAGS_RELEASE "${CMAKE_C_FLAGS_RELEASE} /O2 /fp:fast")
          endif()

          if(VAMP_LTO)
              if(CMAKE_CXX_COMPILER_ID STREQUAL "Clang")
                  set(CMAKE_CXX_FLAGS_RELEASE "${CMAKE_CXX_FLAGS_RELEASE} -flto")
                  set(CMAKE_C_FLAGS_RELEASE "${CMAKE_C_FLAGS_RELEASE} -flto")
              elseif(CMAKE_CXX_COMPILER_ID STREQUAL "GNU")
                  set(CMAKE_CXX_FLAGS_RELEASE "${CMAKE_CXX_FLAGS_RELEASE} -flto=auto")
                  set(CMAKE_C_FLAGS_RELEASE "${CMAKE_C_FLAGS_RELEASE} -flto=auto")
              endif()
          endif()
          '@
          Set-Content -Path $file -Value $content
          Write-Host "Patched $file for Windows MSVC"






      # - name: Install dependencies on Mac
      #   if: runner.os == 'macOS'
      #   run: |
      #     brew install boost eigen cmake
      #     cmake -B $GITHUB_WORKSPACE/ompl/build -S $GITHUB_WORKSPACE/ompl \
      #       -DCMAKE_BUILD_TYPE=Release \
      #       -DOMPL_BUILD_DEMOS=OFF \
      #       -DOMPL_BUILD_TESTS=OFF \
      #       -DOMPL_BUILD_PYTESTS=OFF \
      #       -DOMPL_BUILD_PYBINDINGS=OFF \
      #       -DOMPL_BUILD_VAMP=OFF
      #     cmake --build $GITHUB_WORKSPACE/ompl/build --target ompl -j4
      #     sudo cmake --install $GITHUB_WORKSPACE/ompl/build
      - name: Install dependencies on Mac
        if: runner.os == 'macOS'
        run: |
          brew install boost eigen cmake flann
          cmake -B $GITHUB_WORKSPACE/ompl/build -S $GITHUB_WORKSPACE/ompl \
            -DCMAKE_BUILD_TYPE=Release \
            -DOMPL_BUILD_DEMOS=OFF \
            -DOMPL_BUILD_TESTS=OFF \
            -DOMPL_BUILD_PYTESTS=OFF \
            -DOMPL_BUILD_PYBINDINGS=OFF \
            -DOMPL_BUILD_VAMP=ON
          cmake --build $GITHUB_WORKSPACE/ompl/build --target ompl -j4
          # Install only the ompl component, not py-bindings
          sudo cmake --install $GITHUB_WORKSPACE/ompl/build --component ompl

      - name: Install dependencies on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (Test-Path "C:/vcpkg") {
            Remove-Item -Recurse -Force "C:/vcpkg"
          }
          git clone https://github.com/microsoft/vcpkg C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          C:/vcpkg/vcpkg install boost:x64-windows eigen3:x64-windows flann:x64-windows
          # Remove vcpkg python wrapper that hijacks find_package(Python)
          if (Test-Path "C:/vcpkg/installed/x64-windows/share/python") {
            Remove-Item -Recurse -Force "C:/vcpkg/installed/x64-windows/share/python"
          }

      - name: Build OMPL on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B "$env:GITHUB_WORKSPACE/ompl/build" -S "$env:GITHUB_WORKSPACE/ompl" `
            -DCMAKE_BUILD_TYPE=Release `
            -DOMPL_BUILD_DEMOS=OFF `
            -DOMPL_BUILD_TESTS=OFF `
            -DOMPL_BUILD_VAMP=ON `
            -DOMPL_BUILD_PYTESTS=OFF `
            -DOMPL_BUILD_PYBINDINGS=OFF `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DBUILD_SHARED_LIBS=OFF `
            -DCMAKE_CXX_FLAGS="/D_USE_MATH_DEFINES"
          cmake --build "$env:GITHUB_WORKSPACE/ompl/build" --config Release --target ompl

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux* *-win32 *-manylinux_i686"
          CIBW_ARCHS: auto64
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_BUILD_VERBOSITY: 1

          # Use modern manylinux with dnf and new enough glibc
          CIBW_MANYLINUX_X86_64_IMAGE: quay.io/pypa/manylinux_2_34_x86_64

          # Linux: install deps + build boost from source + build OMPL 2.0.0 from submodule
          CIBW_BEFORE_ALL_LINUX: |
            dnf install -y cmake eigen3-devel curl gcc-c++ make flann-devel
            cd /tmp
            curl -L https://archives.boost.io/release/1.80.0/source/boost_1_80_0.tar.gz -o boost.tar.gz
            tar xzf boost.tar.gz
            cd /tmp/boost_1_80_0
            ./bootstrap.sh --with-libraries=serialization,thread,filesystem,date_time,chrono,atomic,system,program_options
            ./b2 install --prefix=/usr/local -j4
            cd /project/ompl
            git fetch --tags
            git checkout 2.0.0
            cmake -B /project/ompl/build -S . \
              -DCMAKE_BUILD_TYPE=Release \
              -DOMPL_BUILD_DEMOS=OFF \
              -DOMPL_BUILD_TESTS=OFF \
              -DOMPL_BUILD_PYTESTS=OFF \
              -DOMPL_BUILD_PYBINDINGS=OFF \
              -DOMPL_BUILD_VAMP=ON \
              -DBOOST_ROOT=/usr/local \
              -DBoost_ROOT=/usr/local
            cmake --build /project/ompl/build --config Release --target ompl -j4
            echo "=== OMPL 2.0.0 built ==="
            ls /project/ompl/build/src/ompl/libompl.so

          CIBW_BEFORE_BUILD: "pip install pybind11 scikit-build-core"

          CIBW_ENVIRONMENT_WINDOWS: >-
            CMAKE_PREFIX_PATH="C:/vcpkg/installed/x64-windows"
            CMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
            GITHUB_WORKSPACE="$env:GITHUB_WORKSPACE"

          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=15.0
            GITHUB_WORKSPACE=$GITHUB_WORKSPACE

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    if: success()
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1