name: Build and Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux* *-win32 *-manylinux_i686"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_BEFORE_BUILD: "pip install pybind11 scikit-build-core"
          CIBW_BUILD_VERBOSITY: 1

          CIBW_BEFORE_ALL_LINUX: |
            yum install -y cmake eigen3-devel curl
            cd /tmp
            curl -L https://archives.boost.io/release/1.80.0/source/boost_1_80_0.tar.gz -o boost.tar.gz
            tar xzf boost.tar.gz
            cd /tmp/boost_1_80_0
            ./bootstrap.sh --with-libraries=serialization,thread,filesystem,date_time,chrono,atomic,system,program_options
            ./b2 install --prefix=/usr/local -j4
            cd /project/ompl
            cmake -B /project/ompl/build -S . \
              -DCMAKE_BUILD_TYPE=Release \
              -DOMPL_BUILD_DEMOS=OFF \
              -DOMPL_BUILD_TESTS=OFF \
              -DOMPL_BUILD_PYTESTS=OFF \
              -DOMPL_BUILD_PYBINDINGS=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DBoost_ROOT=/usr/local \
              -DBOOST_ROOT=/usr/local
            cmake --build /project/ompl/build --config Release --target ompl -j4

          CIBW_BEFORE_ALL_MACOS: |
            brew install boost eigen cmake
            cd $GITHUB_WORKSPACE/ompl
            cmake -B $GITHUB_WORKSPACE/ompl/build -S . \
              -DCMAKE_BUILD_TYPE=Release \
              -DOMPL_BUILD_DEMOS=OFF \
              -DOMPL_BUILD_TESTS=OFF \
              -DOMPL_BUILD_PYTESTS=OFF \
              -DOMPL_BUILD_PYBINDINGS=OFF \
              -DBUILD_SHARED_LIBS=OFF \
              -DCMAKE_OSX_DEPLOYMENT_TARGET=10.15
            cmake --build $GITHUB_WORKSPACE/ompl/build --config Release --target ompl -j4

          CIBW_BEFORE_ALL_WINDOWS: |
            C:/vcpkg/vcpkg.exe install boost:x64-windows eigen3:x64-windows
            cmake -B "$env:GITHUB_WORKSPACE/ompl/build" -S "$env:GITHUB_WORKSPACE/ompl" -DCMAKE_BUILD_TYPE=Release -DOMPL_BUILD_DEMOS=OFF -DOMPL_BUILD_TESTS=OFF -DOMPL_BUILD_PYTESTS=OFF -DOMPL_BUILD_PYBINDINGS=OFF -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DBUILD_SHARED_LIBS=OFF -DCMAKE_CXX_FLAGS="/D_USE_MATH_DEFINES"
            cmake --build "$env:GITHUB_WORKSPACE/ompl/build" --config Release --target ompl

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1