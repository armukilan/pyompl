name: Build and Publish

on:
  push:
    tags:
      - "v*"

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "*-musllinux* *-win32 *-manylinux_i686"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_WINDOWS: "AMD64"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_BEFORE_BUILD: "pip install pybind11 scikit-build-core"
          CIBW_BUILD_VERBOSITY: 1

          CIBW_BEFORE_ALL_LINUX: |
            apt-get install -y libboost-all-dev libeigen3-dev cmake || \
            yum install -y boost-devel eigen3-devel cmake
            cd ompl
            cmake -B build -S . \
              -DCMAKE_BUILD_TYPE=Release \
              -DOMPL_BUILD_DEMOS=OFF \
              -DOMPL_BUILD_TESTS=OFF \
              -DOMPL_BUILD_PYTESTS=OFF \
              -DOMPL_BUILD_PYBINDINGS=OFF \
              -DBUILD_SHARED_LIBS=OFF
            cmake --build build --config Release --target ompl -j4

          CIBW_BEFORE_ALL_MACOS: |
            brew install boost eigen cmake
            cd ompl
            cmake -B build -S . \
              -DCMAKE_BUILD_TYPE=Release \
              -DOMPL_BUILD_DEMOS=OFF \
              -DOMPL_BUILD_TESTS=OFF \
              -DOMPL_BUILD_PYTESTS=OFF \
              -DOMPL_BUILD_PYBINDINGS=OFF \
              -DBUILD_SHARED_LIBS=OFF
            cmake --build build --config Release --target ompl -j4

          CIBW_BEFORE_ALL_WINDOWS: |
            git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
            C:/vcpkg/bootstrap-vcpkg.bat
            C:/vcpkg/vcpkg.exe install boost:x64-windows eigen3:x64-windows
            cd ompl
            cmake -B build -S . -DCMAKE_BUILD_TYPE=Release -DOMPL_BUILD_DEMOS=OFF -DOMPL_BUILD_TESTS=OFF -DOMPL_BUILD_PYTESTS=OFF -DOMPL_BUILD_PYBINDINGS=OFF -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DBUILD_SHARED_LIBS=OFF -DCMAKE_CXX_FLAGS="/D_USE_MATH_DEFINES"
            cmake --build build --config Release --target ompl

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    needs: build_wheels
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1